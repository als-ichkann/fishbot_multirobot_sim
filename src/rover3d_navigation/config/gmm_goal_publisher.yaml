gmm_goal_publisher:
  ros__parameters:
    goal_topic: "apf_goal"
    publish_rate: 1.0
    # means: 每个高斯分量中心 [x, y, z]，以 map_origin 为参考
    # 单分量: [[3.0, 2.0, 0.0]]
    # 多分量: [[3.0, 2.0, 0.0], [5.0, -1.0, 0.0]]
    means: [[4.0, 0.0, 1.0]]
    covariances: []  # 空则用 default_covariance_scale 生成各向同性协方差
    weights: [1.0]   # 多分量时如 [0.6, 0.4]，会自动归一化
    default_covariance_scale: 0.5
