planning_apf_node:
  ros__parameters:
    robot_names: ["bot1", "bot2", "bot3", "bot4"]
    odom_suffix: "gt/odom"
    goal_topic: "apf_goal"
    trajectory_suffix: "apf_trajectory"
    control_rate: 5.0
    max_apf_try: 10
    gmm_interp_steps: 5
    use_gmm_trajectory_slp: true
    esdf_service: "esdf/query"
    esdf_frame_id: "map_origin"
    map_origin_x: -5.0
    map_origin_y: -7.5
    map_origin_z: 0.0
    map_size_x: 22.0
    map_size_y: 17.0
    map_size_z: 6.0
    esdf_resolution: 0.15
    grid_step: 3.0
    config_dir: ""
